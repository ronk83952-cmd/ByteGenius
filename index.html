<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>ByteGenius</title>

<!-- Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Security -->
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

<!-- Export tools -->
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<!-- ✅ SUPABASE (ONLY ONE VERSION - IMPORTANT) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#f4f7fb;
    --panel:#ffffff;
    --panel-2:#f9fafb;
    --text:#111827;
    --sub:#6b7280;
    --border:#e5e7eb;
    --primary:#2563eb;
    --user:#2563eb;
    --user-text:#ffffff;
    --shadow:0 10px 30px rgba(0,0,0,.06);
}

body.dark{
    --bg:#0b1120;
    --panel:#111827;
    --panel-2:#1f2937;
    --text:#f3f4f6;
    --sub:#9ca3af;
    --border:#243041;
    --primary:#3b82f6;
    --user:#2563eb;
    --user-text:#ffffff;
    --shadow:0 10px 30px rgba(0,0,0,.35);
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    height:100vh;
    display:flex;
    overflow:hidden;
}

/* SIDEBAR */
.sidebar{
    width:280px;
    background:var(--panel);
    border-right:1px solid var(--border);
    display:flex;
    flex-direction:column;
    padding:20px;
    gap:20px;
    transition:.3s ease;
    overflow:hidden;
}

.sidebar.hidden{
    width:0;
    padding:0;
    border-right:none;
}

.brand{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo{
    width:42px;
    height:42px;
    border-radius:14px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:700;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.topbar{
    height:76px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 28px;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:35px 8%;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.message{
    max-width:850px;
    padding:18px 20px;
    border-radius:22px;
}

.user{
    align-self:flex-end;
    background:#2563eb;
    color:white;
}

.ai{
    align-self:flex-start;
    background:var(--panel);
    border:1px solid var(--border);
}

.input-wrapper{
    padding:24px 8%;
}

.input-box{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:24px;
    padding:14px;
    display:flex;
    gap:14px;
}

#prompt{
    flex:1;
    border:none;
    outline:none;
    background:transparent;
    font-size:15px;
}

.send-btn{
    width:52px;
    height:52px;
    border:none;
    border-radius:16px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

    <div class="brand">
        <div class="logo">🤖</div>
        <div>
            <h1>ByteGenius</h1>
            <p>AI Workspace</p>
        </div>
    </div>

    <button onclick="clearChat()">Clear</button>
    <button onclick="exportChat()">Export TXT</button>
    <button onclick="exportPDF()">Export PDF</button>
    <button onclick="document.body.classList.toggle('dark')">Theme</button>

</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        <h3>Workspace</h3>
    </div>

    <div id="chat"></div>

    <div class="input-wrapper">
        <div class="input-box">

            <textarea id="prompt" placeholder="Ask anything..."></textarea>

            <button class="send-btn" onclick="sendMessage()">➤</button>

        </div>
    </div>

</div>

<!-- APP SCRIPT -->
<script src="app.js"></script>

</body>
</html>
